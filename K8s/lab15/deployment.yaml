apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs
  template:
    metadata:
      labels:
        app: nodejs
    spec:
      tolerations:
        - key: "node"
          operator: "Equal"
          value: "worker"
          effect: "NoSchedule"

      containers:
        - name: nodejs
          image: abdelrahman20o2/kubernets-app-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: nodejs-config
                  key: APP_NAME

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: nodejs-config
                  key: PORT

            - name: DB_HOST
              value: mysql

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: nodejs-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nodejs-secret
                  key: DB_PASSWORD

          volumeMounts:
            - name: app-storage
              mountPath: /app/data

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-logs-pvc
